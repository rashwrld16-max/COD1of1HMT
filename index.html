<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of Deriv — by HMT v4</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #070a0f;
  --panel:     #0d1117;
  --border:    #1c2a1c;
  --accent:    #00ff88;
  --accent2:   #00ccff;
  --danger:    #ff3355;
  --warn:      #ffaa00;
  --dim:       #2a3a2a;
  --text:      #c8d8c8;
  --textdim:   #556655;
  --glow:      0 0 16px rgba(0,255,136,0.35);
  --glow2:     0 0 16px rgba(0,204,255,0.35);
  --font-mono: 'Share Tech Mono', monospace;
  --font-hud:  'Rajdhani', sans-serif;
  --font-title:'Orbitron', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-hud);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINES OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
.apex-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg, #070a0f 0%, #0a1a0a 50%, #070a0f 100%);
  position: relative;
  overflow: hidden;
}
.apex-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
}

.logo-block { display: flex; flex-direction: column; }
.logo-title {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 4px;
  text-shadow: var(--glow);
}
.logo-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--textdim);
  letter-spacing: 3px;
  margin-top: 2px;
}

.hud-row {
  display: flex;
  gap: 28px;
  align-items: center;
}
.hud-item { text-align: center; }
.hud-label { font-size: 9px; color: var(--textdim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
.hud-value { font-family: var(--font-mono); font-size: 16px; color: var(--accent); }

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(0,255,136,0.05);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--textdim);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--textdim);
  transition: all 0.3s;
}
.status-dot.active { background: var(--accent); box-shadow: var(--glow); animation: blink 0.8s infinite; }
.status-dot.warn    { background: var(--warn);   box-shadow: 0 0 8px var(--warn); animation: blink 0.4s infinite; }
.status-dot.danger  { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MAIN LAYOUT ── */
.main-wrap {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  min-height: calc(100vh - 70px);
}

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--panel);
  padding: 0;
  display: flex;
  flex-direction: column;
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 18px 20px;
}

.section-label {
  font-family: var(--font-title);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--textdim);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::before {
  content: '';
  width: 12px; height: 1px;
  background: var(--accent);
  flex-shrink: 0;
}

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 10px;
  color: var(--textdim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.field input, .field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--dim);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,255,136,0.1);
}
.field select option { background: #0d1117; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.toggle-row label { font-size: 10px; color: var(--textdim); letter-spacing: 1px; text-transform: uppercase; }

.toggle {
  position: relative;
  width: 44px; height: 22px;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--dim);
  border-radius: 11px;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--textdim);
  top: 3px; left: 3px;
  transition: all 0.3s;
}
.toggle input:checked + .toggle-track { background: rgba(0,255,136,0.25); }
.toggle input:checked + .toggle-track::after {
  left: 25px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}

/* Quality Threshold Display */
.quality-gate-display {
  background: var(--bg);
  border: 1px solid var(--dim);
  border-radius: 2px;
  padding: 12px;
  margin-top: 10px;
  text-align: center;
}
.quality-gate-val {
  font-family: var(--font-title);
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: var(--glow);
}
.quality-gate-label { font-size: 9px; color: var(--textdim); letter-spacing: 2px; margin-top: 2px; }

/* Buttons */
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 20px; }

.btn {
  flex: 1;
  padding: 11px 16px;
  border: 1px solid;
  border-radius: 2px;
  font-family: var(--font-title);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 0.08; }

.btn-scan    { color: var(--accent);  border-color: var(--accent);  }
.btn-stop    { color: var(--danger);  border-color: var(--danger);  }
.btn-loop    { color: var(--accent2); border-color: var(--accent2); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.active  { background: rgba(0,255,136,0.1); box-shadow: var(--glow); }

/* ── CONTENT ── */
.content-area {
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow: hidden;
}

/* SIGNAL BANNER */
.signal-banner {
  background: linear-gradient(90deg, #0a1a0a, #0d1117);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
}
.sig-cell {
  text-align: center;
  padding: 0 12px;
  border-right: 1px solid var(--border);
}
.sig-cell:last-child { border-right: none; }
.sig-cell .label { font-size: 9px; color: var(--textdim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.sig-cell .val { font-family: var(--font-mono); font-size: 18px; color: var(--accent); }
.sig-cell .val.danger { color: var(--danger); }
.sig-cell .val.warn   { color: var(--warn);   }
.sig-cell .val.cyan   { color: var(--accent2); }
.sig-cell .val.small  { font-size: 12px; }

/* GRID CONTENT */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  flex: 1;
}

.panel {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px;
}
.panel:nth-child(even) { border-right: none; }
.panel-title {
  font-family: var(--font-title);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--textdim);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* STATS GRID */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 12px;
  text-align: center;
}
.stat-box .label { font-size: 9px; color: var(--textdim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.stat-box .val   { font-family: var(--font-mono); font-size: 20px; color: var(--text); }
.stat-box .val.green  { color: var(--accent); text-shadow: var(--glow); }
.stat-box .val.red    { color: var(--danger); }
.stat-box .val.yellow { color: var(--warn); }

/* DIGIT STREAM */
.digit-stream {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  max-height: 90px;
  overflow: hidden;
}
.d-chip {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--textdim);
  transition: all 0.2s;
  background: var(--bg);
}
.d-chip.entry   { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
.d-chip.new     { border-color: var(--accent2); color: var(--accent2); animation: chipIn 0.3s ease; }

@keyframes chipIn { from { transform: scale(1.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* RECOVERY INTELLIGENCE */
.recovery-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 14px;
  margin-top: 10px;
}
.recovery-mode-label {
  font-family: var(--font-title);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--warn);
  margin-bottom: 8px;
}
.recovery-bars { display: flex; gap: 4px; }
.r-bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.r-bar-label { font-size: 9px; color: var(--textdim); }
.r-bar-fill {
  width: 100%;
  height: 40px;
  background: var(--dim);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.r-bar-inner {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--accent);
  transition: height 0.4s ease;
  border-radius: 2px;
}
.r-bar-inner.best { background: var(--accent); }
.r-bar-inner.mid  { background: var(--accent2); }
.r-bar-inner.low  { background: var(--warn); }

/* SCAN PROGRESS */
.scan-progress-wrap {
  margin-top: 8px;
}
.scan-bar-track {
  width: 100%; height: 4px;
  background: var(--dim);
  border-radius: 2px;
  margin-bottom: 4px;
  overflow: hidden;
}
.scan-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  width: 0;
  transition: width 0.4s ease;
}
.win-progress-wrap { margin-top: 8px; }
.win-bar-track { width: 100%; height: 6px; background: var(--dim); border-radius: 2px; overflow: hidden; }
.win-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #00ff44);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s ease;
  box-shadow: 0 0 8px rgba(0,255,136,0.5);
}

/* QUALITY METER (circular) */
.quality-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 10px 0;
}
.quality-ring {
  width: 100px; height: 100px;
  position: relative;
}
.quality-ring svg { transform: rotate(-90deg); }
.ring-bg  { fill: none; stroke: var(--dim); stroke-width: 8; }
.ring-arc { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
}
.ring-pct { font-size: 20px; color: var(--accent); }
.ring-lbl { font-size: 8px; color: var(--textdim); letter-spacing: 1px; }

/* RESCAN COUNTER */
.rescan-box {
  background: rgba(255,170,0,0.07);
  border: 1px solid rgba(255,170,0,0.25);
  border-radius: 2px;
  padding: 10px 14px;
  margin-top: 8px;
  display: none;
  align-items: center;
  gap: 10px;
}
.rescan-box.active { display: flex; }
.rescan-spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--warn);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.rescan-txt { font-family: var(--font-mono); font-size: 11px; color: var(--warn); }

/* LOG */
.log-scroll {
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}
.log-scroll::-webkit-scrollbar { width: 4px; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.log-line {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--textdim);
  display: flex;
  gap: 8px;
}
.log-line.success { color: var(--accent); }
.log-line.error   { color: var(--danger); }
.log-line.warn    { color: var(--warn);   }
.log-line.info    { color: var(--accent2); }
.log-time { opacity: 0.5; flex-shrink: 0; }

/* TRADE JOURNAL */
.journal-scroll {
  max-height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}
.journal-scroll::-webkit-scrollbar { width: 4px; }
.journal-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.journal-header, .journal-row {
  display: grid;
  grid-template-columns: 70px 1fr 60px 60px 70px;
  gap: 0;
  font-size: 11px;
}
.journal-header {
  font-family: var(--font-title);
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--textdim);
  border-bottom: 1px solid var(--border);
  padding: 0 0 6px 0;
  text-transform: uppercase;
}
.journal-row {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  padding: 5px 0;
  font-family: var(--font-mono);
  transition: background 0.2s;
}
.journal-row:hover { background: rgba(255,255,255,0.02); }
.journal-row.win  { color: var(--accent); }
.journal-row.loss { color: var(--danger); }
.journal-row > div { padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* PHASE INDICATOR */
.phase-track {
  display: flex;
  gap: 4px;
  margin-top: 10px;
}
.phase-step {
  flex: 1;
  height: 4px;
  background: var(--dim);
  border-radius: 2px;
  transition: background 0.3s;
}
.phase-step.done   { background: var(--accent); }
.phase-step.active { background: var(--warn); animation: phasePulse 0.5s infinite; }

@keyframes phasePulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* RECOVERY INTEL DISPLAY */
.intel-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-top: 8px;
}
.intel-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 6px 4px;
  text-align: center;
  transition: all 0.3s;
}
.intel-cell.best {
  border-color: var(--accent);
  background: rgba(0,255,136,0.08);
  box-shadow: var(--glow);
}
.intel-cell .d-num   { font-family: var(--font-mono); font-size: 16px; }
.intel-cell .d-score { font-size: 9px; color: var(--textdim); margin-top: 2px; }

/* TRADING ACTIVE BADGE */
.trading-badge {
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(255,170,0,0.08);
  border: 1px solid rgba(255,170,0,0.3);
  border-radius: 2px;
  padding: 10px 20px;
  margin: 0 20px 14px;
}
.trading-badge.active { display: flex; }
.trading-badge-text {
  font-family: var(--font-title);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--warn);
}

/* Market radio */
.market-opts { display: flex; gap: 12px; }
.mopt {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--textdim); cursor: pointer;
}
.mopt input[type=radio] { accent-color: var(--accent); }

/* Token warning */
.token-warn {
  display: none;
  background: rgba(255,51,85,0.08);
  border: 1px solid rgba(255,51,85,0.3);
  color: var(--danger);
  font-size: 11px;
  padding: 8px 10px;
  border-radius: 2px;
  margin-top: 6px;
}
.token-warn.show { display: block; }

/* MOBILE */
@media (max-width: 900px) {
  .main-wrap { grid-template-columns: 1fr; }
  .content-grid { grid-template-columns: 1fr; }
  .signal-banner { grid-template-columns: repeat(3, 1fr); }
  .apex-header { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<div class="apex-header">
  <div class="logo-block">
    <div class="logo-title">CALL OF DERIV</div>
    <div class="logo-sub">BY HMT — ELITE DIGIT SCANNER v4.0 — APEX SCIENTIST RECOVERY ENGINE</div>
  </div>
  <div class="hud-row">
    <div class="hud-item">
      <div class="hud-label">Balance</div>
      <div class="hud-value" id="hdBalance">$0.00</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Session P&L</div>
      <div class="hud-value" id="hdPL" style="color:var(--text)">$0.00</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Total P&L</div>
      <div class="hud-value" id="hdTotalPL" style="color:var(--text)">$0.00</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Win Rate</div>
      <div class="hud-value" id="hdWR">—%</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Timer</div>
      <div class="hud-value" id="hdTimer" style="color:var(--textdim)">00:00:00</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">IDLE</span>
  </div>
</div>

<!-- ═══════════════ MAIN WRAP ═══════════════ -->
<div class="main-wrap">

  <!-- ─── SIDEBAR ─── -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Authorization</div>
      <div class="field">
        <label>API Token</label>
        <input type="password" id="apiToken" placeholder="Paste Deriv token here...">
      </div>
      <div class="token-warn" id="tokenWarn">⚠ API token required</div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Market Selection</div>
      <div class="market-opts">
        <label class="mopt"><input type="radio" name="mktMode" value="all" checked> All 13</label>
        <label class="mopt"><input type="radio" name="mktMode" value="exclude1s"> Exclude 1s</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Quality Gate</div>
      <div class="field">
        <label>Min Quality Threshold (%)</label>
        <input type="number" id="qualityThreshold" value="95" min="60" max="99" step="1">
      </div>
      <div class="field">
        <label>Max Rescan Attempts</label>
        <input type="number" id="maxRescans" value="10" min="1" max="50">
      </div>
      <div class="quality-gate-display">
        <div class="quality-gate-val" id="gateDisplay">95%</div>
        <div class="quality-gate-label">MINIMUM SIGNAL QUALITY</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Session Config</div>
